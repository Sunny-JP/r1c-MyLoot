<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MyLoot</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="theme-color" content="#020166" />
    <link rel="stylesheet" href="/src/style.css" />
    <script type="module" src="/src/main.ts"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0P3SKTXEWX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-0P3SKTXEWX");
    </script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body x-data="app" :class="{ 'dark': darkMode }" x-cloak x-effect="document.title = t('siteTitle');">
    <div class="menu-overlay" x-show="isMenuOpen" @click="isMenuOpen = false" x-transition.opacity></div>

    <aside class="side-menu" :class="{ 'is-open': isMenuOpen }">
      <header class="menu-header" style="display: flex; justify-content: space-between; align-items: center">
        <h2 style="margin: 0; font-size: 16px" x-text="t('events')"></h2>
        <button @click="toggleEventSort()" class="icon-btn" :title="t('sortEvents')">
          <span class="material-icons-round" x-text="eventSortDesc ? 'arrow_downward' : 'arrow_upward'"></span>
        </button>
      </header>
      <nav class="menu-content">
        <template x-for="event in events" :key="event.id">
          <div class="event-card-wrapper" @contextmenu.prevent="activeContextId = (activeContextId === event.id ? null : event.id)" @touchstart="handleLongPressStart(event.id)" @touchend="handleLongPressEnd()">
            <div class="event-card" :class="{ 'active': currentEvent && currentEvent.id === event.id }" @click="selectEvent(event)">
              <span class="event-name" x-text="event.name"></span>
              <span class="event-date" x-show="event.date" x-text="event.date"></span>
            </div>
            <div class="context-menu" x-show="activeContextId === event.id" @click.away="activeContextId = null" x-transition.opacity>
              <button @click="openEventEditModal(event)" class="context-btn" :title="t('edit')"><span class="material-icons-round">edit</span></button>
              <button @click="duplicateEvent(event)" class="context-btn" :title="t('duplicate')"><span class="material-icons-round">content_copy</span></button>
              <button @click="deleteEvent(event.id)" class="context-btn del" :title="t('delete')"><span class="material-icons-round">delete</span></button>
            </div>
          </div>
        </template>
        <button @click="openEventCreateModal()" class="btn-pill" style="width: 100%; margin-top: 8px;"><span class="material-icons-round">add</span> <span x-text="t('newEvent')"></span></button>
      </nav>
      <footer class="side-footer">
        <div style="display: flex; gap: 4px; margin-bottom: 8px">
          <button class="btn-pill" style="flex: 1" @click="exportData()" x-text="t('export')"></button>
          <label class="btn-pill" style="flex: 1; text-align: center"><span x-text="t('import')"></span><input type="file" @change="importData" hidden /></label>
        </div>
        <div style="display: flex; gap: 4px; align-items: stretch; margin-bottom: 8px">
          <button @click="toggleDarkMode()" class="btn-pill"><span class="material-icons-round" x-text="darkMode ? 'dark_mode' : 'light_mode'"></span></button>
          <select class="input-flat" x-model="lang" @change="setLang($event.target.value)" style="flex: 1">
            <template x-for="l in languageList" :key="l.code">
              <option :value="l.code" x-text="l.label" :selected="l.code === lang"></option>
            </template>
          </select>
        </div>
        <button @click="isAboutOpen = true; isMenuOpen = false" class="btn-pill" style="width: 100%"><span class="material-icons-round" style="font-size: 18px; margin-right: 4px">info</span>About</button>
      </footer>
    </aside>

    <div class="app-shell">
      <header class="app-bar">
        <button @click="isMenuOpen = true" class="icon-btn light"><span class="material-icons-round">menu</span></button>
        <div class="title-group">
          <small x-text="t('siteTitle')"></small>
          <h1 x-text="currentEvent?.name"></h1>
        </div>
        <div class="price-tag">¥<span x-text="totalPrice.toLocaleString()" style="margin-left: 2px"></span></div>
      </header>

      <div class="content-split" id="split-container">
        <main class="list-pane" id="list-pane">
          <div class="toolbar">
            <div class="btn-group-container" x-show="!isDeleteMode">
              <span class="group-label">Circles</span>
              <div class="btn-group">
                <button @click="openAddForm()" class="btn-tool primary" :title="t('add')"><span class="material-icons-round">add</span></button>
                <button @click="toggleDeleteMode()" class="btn-tool" :title="t('select')"><span class="material-icons-round">checklist</span></button>
                <button @click="toggleColumns()" class="btn-tool" :title="t('listGrid')"><span class="material-icons-round" x-text="columns === 1 ? 'grid_view' : 'view_list'"></span></button>
              </div>
            </div>

            <div class="btn-group-container" x-show="isDeleteMode" x-cloak>
              <span class="group-label">Select</span>
              <div class="btn-group">
                <button @click="selectAll()" class="btn-tool" :title="t('selectAll')"><span class="material-icons-round">done_all</span></button>
                <button @click="deselectAll()" class="btn-tool" :title="t('deselectAll')"><span class="material-icons-round">remove_done</span></button>
                <button @click="deleteSelected()" class="btn-tool danger" :title="t('delete')"><span class="material-icons-round">delete</span></button>
                <button @click="toggleDeleteMode()" class="btn-tool" :title="t('cancel')"><span class="material-icons-round">close</span></button>
              </div>
            </div>

            <div class="btn-group-container" x-show="!isDeleteMode">
              <span class="group-label">Sort</span>
              <div class="btn-group">
                <button @click="setSortOrder('space')" class="btn-tool" :class="{ 'active': sortOrder === 'space' }" :title="t('sortSpace')">
                  <span class="material-icons-round">place</span>
                  <span class="material-icons-round sort-arrow" x-show="sortOrder === 'space'" x-text="sortAsc ? 'arrow_downward' : 'arrow_upward'"></span>
                </button>
                <button @click="setSortOrder('name')" class="btn-tool" :class="{ 'active': sortOrder === 'name' }" :title="t('sortName')">
                  <span class="material-icons-round">sort_by_alpha</span>
                  <span class="material-icons-round sort-arrow" x-show="sortOrder === 'name'" x-text="sortAsc ? 'arrow_downward' : 'arrow_upward'"></span>
                </button>
                <button @click="setSortOrder('priority')" class="btn-tool" :class="{ 'active': sortOrder === 'priority' }" :title="t('sortPriority')">
                  <span class="material-icons-round">star</span>
                  <span class="material-icons-round sort-arrow" x-show="sortOrder === 'priority'" x-text="sortAsc ? 'arrow_downward' : 'arrow_upward'"></span>
                </button>
              </div>
            </div>

            <div class="btn-group-container" x-show="!isDeleteMode">
              <span class="group-label">Map PDF</span>
              <div class="btn-group">
                <label class="btn-tool primary" :title="t('add')"><span class="material-icons-round">add</span><input type="file" @change="uploadMapPdf" accept="application/pdf" hidden /></label>
                <button @click="resetMapPdf()" class="btn-tool danger" x-show="pdfUrl" :title="t('delete')"><span class="material-icons-round">delete</span></button>
              </div>
            </div>
          </div>

          <div class="circles-grid" :class="{ 'grid-2col': columns === 2 }">
            <template x-for="circle in circles" :key="circle.id">
              <div class="circle-wrapper" @contextmenu.prevent="if(!isDeleteMode) activeCircleContextId = (activeCircleContextId === circle.id ? null : circle.id)" @touchstart="handleCircleLongPressStart(circle.id)" @touchend="handleCircleLongPressEnd()">
                <article class="circle-card" :class="{ 'checked': circle.isChecked, 'editing': editingId === circle.id }" @click="openCircleDetail(circle)">
                  <div x-show="isDeleteMode" class="selector-box" x-transition.opacity @click.stop>
                    <input type="checkbox" :value="circle.id" x-model="selectedIds" />
                  </div>

                  <div class="thumb" @click.stop="openImagePreview(circle)">
                    <img :src="(circle.images && circle.images.length > 0) ? circle.images[0] : (circle.image || '/noimage.png')" />
                  </div>
                  <div class="info">
                    <div class="title-row">
                      <h3 x-text="circle.name"></h3>
                      <span class="priority-stars" x-show="(circle.priority || 0) > 0">
                        <template x-for="i in (circle.priority || 0)"><span class="material-icons-round">star</span></template>
                      </span>
                    </div>

                    <div class="meta">
                      <span class="badge" x-text="circle.space"></span>
                      <template x-for="(lk, idx) in (circle.links && circle.links.length > 0 ? circle.links : (circle.link ? [circle.link] : []))" :key="idx">
                        <a :href="lk" target="_blank" rel="noopener noreferrer" class="badge link-badge" @click.stop>
                          <span class="material-icons-round" style="font-size: 12px">link</span>
                          <span x-text="(circle.links && circle.links.length > 1) ? (idx + 1) : '1'"></span>
                        </a>
                      </template>
                    </div>

                    <div>
                      <template x-for="(item, idx) in circle.items" :key="idx">
                        <div class="item-row" :class="{ 'done': item.isChecked }">
                          <span class="item-name" x-text="item.name"></span>
                          <span class="price">¥<span x-text="item.price.toLocaleString()" style="margin-left: 2px"></span></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </article>

                <div class="context-menu" x-show="activeCircleContextId === circle.id" @click.away="activeCircleContextId = null" x-transition.opacity>
                  <button @click="openEditForm(circle); activeCircleContextId = null;" class="context-btn" :title="t('edit')"><span class="material-icons-round">edit</span></button>
                  <button @click="deleteCircle(circle.id)" class="context-btn del" :title="t('delete')"><span class="material-icons-round">delete</span></button>
                </div>
              </div>
            </template>
          </div>
        </main>

        <section class="form-pane" x-show="isFormOpen" x-transition.opacity x-cloak>
          <div class="form-card">
            <div class="form-row">
              <div class="form-col">
                <input type="text" x-model="newName" :placeholder="t('circleName')" class="input-flat" />

                <div style="display: flex; gap: 8px; align-items: center">
                  <input type="text" x-model="newSpace" :placeholder="t('space')" class="input-flat" style="flex: 1" />
                  <div class="star-rating" style="flex-shrink: 0">
                    <button type="button" class="icon-btn star" :class="{'active': newPriority >= 1}" @click="newPriority = 1"><span class="material-icons-round">star</span></button>
                    <button type="button" class="icon-btn star" :class="{'active': newPriority >= 2}" @click="newPriority = 2"><span class="material-icons-round">star</span></button>
                    <button type="button" class="icon-btn star" :class="{'active': newPriority >= 3}" @click="newPriority = 3"><span class="material-icons-round">star</span></button>
                    <button type="button" class="icon-btn clear" @click="newPriority = 0"><span class="material-icons-round">close</span></button>
                  </div>
                </div>

                <div class="links-editor" style="display: flex; flex-direction: column; gap: 4px">
                  <template x-for="(lk, index) in newLinks" :key="index">
                    <div style="display: flex; gap: 4px">
                      <input type="url" x-model="lk.url" @input="checkAutoAddLink(index)" :placeholder="t('url')" class="input-flat" style="flex: 1" />
                      <button type="button" @click="removeLinkInForm(index)" class="icon-btn clear"><span class="material-icons-round">close</span></button>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <div class="image-scroll-row">
              <template x-for="(img, idx) in newImagesPreview" :key="idx">
                <div class="image-upload-box has-image">
                  <img :src="img" />
                  <button type="button" class="remove-img-btn" @click="newImagesPreview.splice(idx, 1)"><span class="material-icons-round">close</span></button>
                </div>
              </template>
              <label class="image-upload-box">
                <span class="material-icons-round">add_photo_alternate</span>
                <input type="file" @change="handleImageSelect" accept="image/*" multiple hidden />
              </label>
            </div>

            <div class="item-editor">
              <template x-for="(item, index) in newItems" :key="index">
                <div class="item-input-row">
                  <input type="text" x-model="item.name" @input="checkAutoAdd(index)" :placeholder="t('itemName')" class="input-flat" style="flex: 1" />
                  <input type="number" x-model="item.price" :placeholder="t('price')" class="input-flat" style="width: 80px" />
                  <button type="button" @click="removeItemInForm(index)" class="icon-btn clear"><span class="material-icons-round">close</span></button>
                </div>
              </template>
            </div>
            <div class="form-footer">
              <button @click="saveCircle()" class="btn-pill primary" style="flex: 1" x-text="editingId ? t('update') : t('addToList')"></button>
              <button @click="isFormOpen = false; editingId = null" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
            </div>
          </div>
        </section>

        <section class="map-pane" id="map-pane" :style="mapPaneStyle">
          <div class="drawer-handle" id="resizer">
            <div class="handle-tab">
              <span class="material-icons-round" x-text="window.innerWidth >= 900 ? 'drag_indicator' : 'drag_handle'"></span>
            </div>
          </div>

          <div class="map-body">
            <template x-if="pdfUrl">
              <div class="pdf-scroll-wrapper" id="pdf-scroll-wrapper" @touchstart="handleTouchStart" @touchmove="handleTouchMove">
                <div id="pdf-canvas-container" :style="`width: ${pdfZoom * 100}%; min-width: 100%;`"></div>
              </div>
            </template>
            <div x-show="!pdfUrl" class="map-empty" x-text="t('mapEmpty')"></div>
          </div>
        </section>
      </div>
    </div>

    <div class="floating-modal info-modal" x-show="isCircleDetailOpen" x-transition.opacity x-cloak @click="isCircleDetailOpen = false">
      <div class="form-card about-card" style="height: auto; max-height: 85vh; display: flex; flex-direction: column" @click.stop>
        <template x-if="selectedCircle">
          <div style="display: flex; flex-direction: column; flex: 1; min-height: 0">
            <header class="modal-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-shrink: 0">
              <div style="flex: 1; min-width: 0; margin-right: 8px">
                <h3 style="margin: 0; font-size: 18px; word-break: break-all" x-text="selectedCircle.name"></h3>
                <div class="meta" style="margin-top: 8px; margin-bottom: 0">
                  <span class="badge" x-text="selectedCircle.space"></span>
                  <template x-for="(lk, idx) in (selectedCircle.links && selectedCircle.links.length > 0 ? selectedCircle.links : (selectedCircle.link ? [selectedCircle.link] : []))" :key="idx">
                    <a :href="lk" target="_blank" rel="noopener noreferrer" class="badge link-badge" style="max-width: 100%; overflow: hidden">
                      <span class="material-icons-round" style="font-size: 12px; flex-shrink: 0">link</span>
                      <span x-text="lk" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap"></span>
                    </a>
                  </template>
                </div>
              </div>
              <button @click="isCircleDetailOpen = false" class="icon-btn" style="flex-shrink: 0"><span class="material-icons-round">close</span></button>
            </header>

            <div style="flex: 1; overflow-y: auto; padding-top: 2px; min-height: 0">
              <div style="display: flex; flex-direction: column; gap: 6px">
                <template x-for="(item, idx) in selectedCircle.items" :key="idx">
                  <label class="detail-item-card" :class="{ 'done': item.isChecked }" @click.prevent="toggleItemCheck(selectedCircle.id, idx)">
                    <span class="material-icons-round" :style="item.isChecked ? 'color: var(--suc);' : 'color: var(--mut);'" style="font-size: 24px" x-text="item.isChecked ? 'check_circle' : 'radio_button_unchecked'"></span>
                    <div style="flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px">
                      <div class="item-name" x-text="item.name" style="flex: 1; min-width: 0"></div>
                      <div class="price-tag" style="padding: 2px 8px; font-size: 14px; flex-shrink: 0">¥<span x-text="item.price.toLocaleString()" style="margin-left: 2px"></span></div>
                    </div>
                  </label>
                </template>
                <div x-show="selectedCircle.items.length === 0" style="color: var(--mut); font-size: 13px" x-text="t('purchaseListEmpty')"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="floating-modal info-modal" x-show="isAboutOpen" x-transition.opacity x-cloak @click="isAboutOpen = false">
      <div class="form-card about-card" @click.stop>
        <header class="modal-header" style="display: flex; justify-content: space-between; align-items: center">
          <h3 x-text="t('aboutApp')"></h3>
          <button @click="isAboutOpen = false" class="icon-btn"><span class="material-icons-round">close</span></button>
        </header>
        <nav class="about-tabs">
          <button @click="aboutTab = 'usage'" :class="{'active': aboutTab === 'usage'}" x-text="t('usage')"></button>
          <button @click="aboutTab = 'terms'" :class="{'active': aboutTab === 'terms'}" x-text="t('terms')"></button>
          <button @click="aboutTab = 'policy'" :class="{'active': aboutTab === 'policy'}" x-text="t('policy')"></button>
          <button @click="aboutTab = 'dev'" :class="{'active': aboutTab === 'dev'}" x-text="t('developer')"></button>
        </nav>
        <div class="about-content">
          <div x-show="aboutTab === 'usage'" class="tab-pane">
            <section><p x-text="t('usageIntro')" style="font-size: 13px; margin-bottom: 12px"></p></section>

            <section>
              <h4 x-text="t('usageStep1Title')"></h4>
              <ul>
                <li x-text="t('usageStep1Desc1')"></li>
                <li x-text="t('usageStep1Desc2')"></li>
                <li x-text="t('usageStep1Desc3')"></li>
              </ul>
            </section>

            <section>
              <h4 x-text="t('usageStep2Title')"></h4>
              <ul>
                <li x-text="t('usageStep2Desc1')"></li>
                <li x-text="t('usageStep2Desc2')"></li>
                <li x-text="t('usageStep2Desc3')"></li>
              </ul>
            </section>

            <section>
              <h4 x-text="t('usageStep3Title')"></h4>
              <ul>
                <li x-text="t('usageStep3Desc1')"></li>
                <li x-text="t('usageStep3Desc2')"></li>
                <li x-text="t('usageStep3Desc3')"></li>
              </ul>
            </section>

            <section>
              <h4 x-text="t('usageStep4Title')"></h4>
              <ul>
                <li x-text="t('usageStep4Desc1')"></li>
                <li x-text="t('usageStep4Desc2')"></li>
              </ul>
            </section>
          </div>

          <div x-show="aboutTab === 'terms'" class="tab-pane">
            <section><p x-text="t('termsIntro')" style="font-size: 13px; margin-bottom: 12px"></p></section>
            <section>
              <h4 x-text="t('termsSec1Title')"></h4>
              <ul>
                <li x-text="t('termsSec1Desc1')"></li>
                <li x-text="t('termsSec1Desc2')"></li>
              </ul>
            </section>
            <section>
              <h4 x-text="t('termsSec2Title')"></h4>
              <ul>
                <li x-text="t('termsSec2Desc1')"></li>
                <li x-text="t('termsSec2Desc2')"></li>
                <li x-text="t('termsSec2Desc3')"></li>
              </ul>
            </section>
            <section>
              <h4 x-text="t('termsSec3Title')"></h4>
              <ul>
                <li x-text="t('termsSec3Desc1')"></li>
              </ul>
            </section>
            <section>
              <h4 x-text="t('termsSec4Title')"></h4>
              <ul>
                <li x-text="t('termsSec4Desc1')"></li>
                <li x-text="t('termsSec4Desc2')"></li>
              </ul>
            </section>
          </div>

          <div x-show="aboutTab === 'policy'" class="tab-pane">
            <section><p x-text="t('policyIntro')" style="font-size: 13px; margin-bottom: 12px"></p></section>
            <section>
              <h4 x-text="t('policySec1Title')"></h4>
              <ul>
                <li x-text="t('policySec1Desc1')"></li>
                <li x-text="t('policySec1Desc2')"></li>
              </ul>
            </section>
            <section>
              <h4 x-text="t('policySec2Title')"></h4>
              <ul>
                <li x-text="t('policySec2Desc1')"></li>
              </ul>
            </section>
          </div>

          <div x-show="aboutTab === 'dev'" class="tab-pane">
            <section>
              <h4 x-text="t('devTeam')"></h4>
              <p x-text="t('devInfo')"></p>
              <div class="link">
                <a href="https://x.com/156miyako" target="_blank" rel="noopener" class="badge link-badge"> <span class="material-icons-round" style="font-size: 14px; margin-right: 4px">link</span>X: @156miyako </a>
                <a href="https://github.com/Sunny-JP/r1c-MyLoot" target="_blank" rel="noopener" class="badge link-badge"> <span class="material-icons-round" style="font-size: 14px; margin-right: 4px">code</span>GitHub </a>
              </div>
            </section>
            <section>
              <h4 x-text="t('feedbackTitle')"></h4>
              <p x-text="t('feedbackDesc')"></p>
            </section>
            <section>
              <h4 x-text="t('loot')"></h4>
              <p x-text="t('lootMean')"></p>
            </section>
          </div>
        </div>
      </div>
    </div>

    <div class="floating-modal image-modal" x-show="previewImages.length > 0" x-transition.opacity x-cloak @click="previewImages = []">
      <button class="icon-btn light modal-close-btn" @click.stop="previewImages = []"><span class="material-icons-round">close</span></button>
      <button class="slider-btn prev" x-show="previewImages.length > 1" @click.stop="prevPreview()"><span class="material-icons-round">chevron_left</span></button>
      <div class="preview-window" @click.stop><img :src="previewImages[previewIndex]" :style="imgStyles" @load="updateImgStyle" /></div>
      <button class="slider-btn next" x-show="previewImages.length > 1" @click.stop="nextPreview()"><span class="material-icons-round">chevron_right</span></button>
      <div class="slider-dots" x-show="previewImages.length > 1" @click.stop>
        <template x-for="(img, idx) in previewImages" :key="idx">
          <div class="dot" :class="{'active': idx === previewIndex}"></div>
        </template>
      </div>
    </div>

    <div class="floating-modal event-modal" x-show="isEventModalOpen" x-transition.opacity x-cloak>
      <div class="form-card event-form">
        <header class="modal-header"><h3 x-text="editingEventId ? t('edit') : t('newEvent')"></h3></header>
        <div class="form-row">
          <div class="form-col">
            <span class="group-label" x-text="t('eventName')"></span>
            <input type="text" x-model="tempEventName" class="input-flat" :placeholder="t('eventName')" />
            <span class="group-label" x-text="t('eventDate')"></span>
            <input type="date" x-model="tempEventDate" class="input-flat" />
          </div>
        </div>
        <div class="form-footer">
          <button @click="saveEvent()" class="btn-pill primary" style="flex: 1" x-text="editingEventId ? t('update') : t('add')"></button>
          <button @click="isEventModalOpen = false" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
        </div>
      </div>
    </div>
  </body>
</html>
