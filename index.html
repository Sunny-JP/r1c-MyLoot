<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MyLoot</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="theme-color" content="#020166" />
    <link rel="stylesheet" href="/src/style.css" />
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0P3SKTXEWX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-0P3SKTXEWX");
    </script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body x-data="app" :class="(isDark ? 'dark ' : 'light ') + (themeColor !== 'blue' ? 'theme-' + themeColor : '')" x-cloak x-effect="document.title = t('siteTitle');">
    <div class="menu-overlay" x-show="isMenuOpen" @click="isMenuOpen = false" x-transition.opacity></div>

    <aside class="side-menu" :class="{ 'is-open': isMenuOpen }">
      <header class="menu-header" style="display: flex; justify-content: space-between; align-items: center">
        <h2 style="margin: 0; font-size: 16px" x-text="t('events')"></h2>
        <button @click="toggleEventSort()" class="icon-btn" :title="t('sortEvents')">
          <span class="material-icons-round" x-text="eventSortDesc ? 'arrow_downward' : 'arrow_upward'"></span>
        </button>
      </header>
      <nav class="menu-content">
        <template x-for="event in events" :key="event.id">
          <div class="event-card-wrapper" @contextmenu.prevent="activeContextId = (activeContextId === event.id ? null : event.id)">
            <div class="event-card" :class="{ 'active': currentEvent && currentEvent.id === event.id }" @click="selectEvent(event)">
              <div class="event-card-content">
                <div class="event-name" x-text="event.name"></div>
                <div class="event-date" x-show="event.date" x-text="event.date"></div>
              </div>
              <button class="icon-btn event-menu-btn" @click.stop="activeContextId = (activeContextId === event.id ? null : event.id)">
                <span class="material-icons-round">more_vert</span>
              </button>
            </div>
            <div class="context-menu" x-show="activeContextId === event.id" @click.away="activeContextId = null" x-transition.opacity>
              <button @click="openEventEditModal(event)" class="context-btn" :title="t('edit')"><span class="material-icons-round">edit</span></button>
              <button @click="duplicateEvent(event)" class="context-btn" :title="t('duplicate')"><span class="material-icons-round">content_copy</span></button>
              <button @click="deleteEvent(event.id)" class="context-btn del" :title="t('delete')"><span class="material-icons-round">delete</span></button>
            </div>
          </div>
        </template>
        <button @click="openEventCreateModal()" class="btn-pill" style="width: 100%; margin-top: 8px"><span class="material-icons-round">add</span> <span x-text="t('newEvent')"></span></button>
      </nav>

      <footer class="side-footer">
        <div style="display: flex; gap: 4px; margin-bottom: 8px">
          <button class="btn-pill" style="flex: 1" @click="exportData()" x-text="t('export')"></button>
          <label class="btn-pill" style="flex: 1; text-align: center"><span x-text="t('import')"></span><input type="file" @change="importData" hidden /></label>
        </div>
        <button @click="isSettingsOpen = true; isMenuOpen = false" class="btn-pill" style="width: 100%; margin-bottom: 8px; gap: 4px">
          <span class="material-icons-round" style="font-size: 18px">settings</span>
          <span x-text="t('settings')"></span>
        </button>
        <button @click="isAboutOpen = true; isMenuOpen = false" class="btn-pill" style="width: 100%; gap: 4px">
          <span class="material-icons-round" style="font-size: 18px">info</span>
          <span>About</span>
        </button>
      </footer>
    </aside>

    <div class="app-shell">
      <header class="app-bar">
        <button @click="isMenuOpen = true" class="icon-btn header-menu-btn"><span class="material-icons-round">menu</span></button>
        <div class="title-group">
          <small x-text="t('siteTitle')"></small>
          <h1 x-text="currentEvent?.name"></h1>
        </div>
        <button class="price-tag" @click="isSummaryOpen = true">¥<span x-text="totalPrice.toLocaleString()" style="margin-left: 2px"></span></button>
      </header>

      <div class="content-split" id="split-container">
        <main class="list-pane" id="list-pane">
          <div class="toolbar-container">
            <div class="toolbar" x-show="isToolbarOpen" x-transition.collapse>
              <div class="btn-group-container" x-show="!isDeleteMode">
                <span class="group-label">Circles</span>
                <div class="btn-group">
                  <button @click="openAddForm()" class="btn-tool" :title="t('add')"><span class="material-icons-round">add</span></button>
                  <button @click="toggleDeleteMode()" class="btn-tool" :class="{'active': isDeleteMode}" :title="t('edit')"><span class="material-icons-round">edit</span></button>
                  <button @click="toggleColumns()" class="btn-tool" :title="t('listGrid')"><span class="material-icons-round" x-text="columns === 1 ? 'grid_view' : 'view_list'"></span></button>
                </div>
              </div>

              <div class="btn-group-container" x-show="isDeleteMode" x-cloak>
                <span class="group-label">Edit Mode</span>
                <div class="btn-group">
                  <button @click="selectAll()" class="btn-tool" :title="t('selectAll')"><span class="material-icons-round">done_all</span></button>
                  <button @click="deselectAll()" class="btn-tool" :title="t('deselectAll')"><span class="material-icons-round">remove_done</span></button>
                  <button @click="deleteSelected()" class="btn-tool danger" :title="t('delete')"><span class="material-icons-round">delete</span></button>
                  <button @click="toggleDeleteMode()" class="btn-tool" :title="t('cancel')"><span class="material-icons-round">close</span></button>
                </div>
              </div>

              <div class="btn-group-container" x-show="!isDeleteMode">
                <span class="group-label">Map PDF</span>
                <div class="btn-group">
                  <label class="btn-tool" :title="t('add')"><span class="material-icons-round">add</span><input type="file" @change="uploadMapPdf" accept="application/pdf" hidden /></label>
                  <button @click="resetMapPdf()" class="btn-tool danger" x-show="pdfUrl" :title="t('delete')"><span class="material-icons-round">delete</span></button>
                </div>
              </div>
            </div>

            <button @click="toggleToolbar()" class="toolbar-tab">
              <span class="material-icons-round" x-text="isToolbarOpen ? 'expand_less' : 'expand_more'"></span>
            </button>
          </div>

          <div class="circles-grid" :class="{ 'grid-2col': columns === 2 }">
            <template x-for="(circle, index) in circles" :key="circle.uuid">
              <div class="circle-wrapper" :data-uuid="circle.uuid">
                <article class="circle-card" :class="{ 'checked': circle.isChecked, 'editing': editingUuid === circle.uuid }" @click="isDeleteMode ? openEditForm(circle) : openCircleDetail(circle)">
                  <div class="top-right-actions" @click.stop>
                    <span class="badge" x-show="!isDeleteMode && circle.space" x-text="circle.space" style="font-size: 11px; padding: 2px 6px; min-height: 20px"></span>
                    <div x-show="isDeleteMode" class="selector-box" x-transition.opacity>
                      <input type="checkbox" :value="circle.uuid" x-model="selectedUuids" />
                    </div>
                  </div>

                  <div x-show="isDeleteMode" class="edit-controls" x-transition.opacity @click.stop>
                    <div class="move-actions">
                      <button class="icon-btn move-btn" @click="moveCircleUp(index)" :disabled="index === 0"><span class="material-icons-round">keyboard_arrow_up</span></button>
                      <button class="icon-btn move-btn" @click="moveCircleDown(index)" :disabled="index === circles.length - 1"><span class="material-icons-round">keyboard_arrow_down</span></button>
                    </div>
                  </div>

                  <div class="thumb" @click.stop="isDeleteMode ? openEditForm(circle) : openImagePreview(circle)">
                    <img :src="(circle.images && circle.images.length > 0) ? circle.images[0] : (circle.image || '/noimage.png')" />
                  </div>
                  <div class="info">
                    <div class="title-row">
                      <h3 x-text="circle.name"></h3>
                    </div>

                    <div>
                      <template x-for="(item, idx) in circle.items" :key="idx">
                        <div class="item-row" :class="{ 'done': item.isChecked }">
                          <span class="item-name" x-text="item.name"></span>
                          <span x-show="item.quantity > 1" x-text="'x' + item.quantity" style="color: var(--mut); font-size: 12px; margin: 0 4px"></span>
                          <span class="price">¥<span x-text="((item.price || 0) * (item.quantity || 1)).toLocaleString()" style="margin-left: 2px"></span></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </article>
              </div>
            </template>
          </div>
        </main>

        <section class="form-pane" x-show="isFormOpen" x-transition.opacity x-cloak>
          <div class="form-card">
            <div class="form-row">
              <div class="form-col">
                <input type="text" x-model="newName" :placeholder="t('circleName')" class="input-flat" />

                <div style="display: flex; gap: 8px; align-items: center">
                  <input type="text" x-model="newSpace" :placeholder="t('space')" class="input-flat" style="flex: 1" />
                </div>

                <div class="links-editor" style="display: flex; flex-direction: column; gap: 4px">
                  <template x-for="(lk, index) in newLinks" :key="index">
                    <div style="display: flex; gap: 4px">
                      <input type="url" x-model="lk.url" @input="checkAutoAddLink(index)" :placeholder="t('url')" class="input-flat" style="flex: 1" />
                      <button type="button" @click="removeLinkInForm(index)" class="icon-btn clear"><span class="material-icons-round">remove</span></button>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <div class="image-scroll-row">
              <template x-for="(img, idx) in newImagesPreview" :key="idx">
                <div class="image-upload-box has-image">
                  <img :src="img" />
                  <button type="button" class="remove-img-btn" @click="newImagesPreview.splice(idx, 1)"><span class="material-icons-round">close</span></button>
                </div>
              </template>
              <label class="image-upload-box">
                <span class="material-icons-round">add_photo_alternate</span>
                <input type="file" @change="handleImageSelect" accept="image/*" multiple hidden />
              </label>
            </div>

            <div class="item-editor">
              <template x-for="(item, index) in newItems" :key="index">
                <div class="item-input-row" style="align-items: center">
                  <input type="text" x-model="item.name" @input="checkAutoAdd(index)" :placeholder="t('itemName')" class="input-flat" style="flex: 1; min-width: 0" />
                  <span style="color: var(--mut); font-size: 12px; padding: 0 4px">@</span>
                  <input type="number" x-model="item.price" :placeholder="t('price')" class="input-flat text-right" style="width: 55px" />
                  <span style="color: var(--mut); font-size: 12px; padding: 0 4px">x</span>
                  <input type="number" x-model="item.quantity" :placeholder="t('quantity')" class="input-flat text-right" style="width: 40px" />
                  <button type="button" @click="removeItemInForm(index)" class="icon-btn clear"><span class="material-icons-round">remove</span></button>
                </div>
              </template>
            </div>
            <div class="form-footer">
              <button @click="saveCircle()" class="btn-pill primary" style="flex: 1" x-text="editingUuid ? t('update') : t('addToList')"></button>
              <button @click="closeForm()" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
            </div>
          </div>
        </section>

        <section class="map-pane" id="map-pane" :style="mapPaneStyle">
          <div class="drawer-handle" id="resizer">
            <div class="handle-tab">
              <span class="material-icons-round" x-text="window.innerWidth >= 900 ? 'drag_indicator' : 'drag_handle'"></span>
            </div>
          </div>

          <div class="map-body">
            <template x-if="pdfUrl">
              <div class="pdf-scroll-wrapper" id="pdf-scroll-wrapper" @touchstart="handleTouchStart" @touchmove="handleTouchMove" @dblclick="togglePdfZoom($event)">
                <div id="pdf-canvas-container" :style="`width: ${pdfZoom * 100}%; min-width: 100%;`"></div>
              </div>
            </template>
            <div x-show="!pdfUrl" class="map-empty" x-text="t('mapEmpty')"></div>
          </div>
        </section>
      </div>
    </div>

    <div class="floating-modal info-modal" x-show="isCircleDetailOpen" x-transition.opacity x-cloak @click="isCircleDetailOpen = false">
      <div class="form-card about-card" style="height: auto; max-height: 85dvh; display: flex; flex-direction: column" @click.stop>
        <template x-if="selectedCircle">
          <div style="display: flex; flex-direction: column; flex: 1; min-height: 0">
            <header class="modal-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-shrink: 0">
              <div style="flex: 1; min-width: 0; margin-right: 8px">
                <h3 style="margin: 0; font-size: 18px; word-break: break-all" x-text="selectedCircle.name"></h3>
                <div class="meta" style="margin-top: 8px; margin-bottom: 0">
                  <span class="badge" x-text="selectedCircle.space"></span>
                  <template x-for="(lk, idx) in (selectedCircle.links && selectedCircle.links.length > 0 ? selectedCircle.links : (selectedCircle.link ? [selectedCircle.link] : []))" :key="idx">
                    <a :href="lk" target="_blank" rel="noopener noreferrer" class="badge link-badge" style="max-width: 100%; overflow: hidden">
                      <span class="material-icons-round" style="font-size: 12px; flex-shrink: 0">link</span>
                      <span x-text="lk" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap"></span>
                    </a>
                  </template>
                </div>
              </div>
            </header>

            <div style="flex: 1; overflow-y: auto; padding-top: 2px; min-height: 0">
              <div style="display: flex; flex-direction: column; gap: 6px">
                <template x-for="(item, idx) in selectedCircle.items" :key="idx">
                  <label class="detail-item-card" :class="{ 'done': item.isChecked }" @click.prevent="toggleItemCheck(selectedCircle.uuid, idx)">
                    <span class="material-icons-round" :style="item.isChecked ? 'color: var(--suc);' : 'color: var(--mut);'" style="font-size: 24px" x-text="item.isChecked ? 'check_circle' : 'radio_button_unchecked'"></span>
                    <div style="flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px">
                      <div style="flex: 1; min-width: 0; display: flex; flex-direction: column">
                        <div class="item-name" x-text="item.name"></div>
                        <div style="font-size: 12px; color: var(--mut)"><span x-text="'@' + (item.price || 0).toLocaleString()"></span> x <span x-text="item.quantity || 1"></span></div>
                      </div>
                      <div class="price-tag" style="padding: 2px 8px; font-size: 14px; flex-shrink: 0; cursor: default">¥<span x-text="((item.price || 0) * (item.quantity || 1)).toLocaleString()" style="margin-left: 2px"></span></div>
                    </div>
                  </label>
                </template>
                <div x-show="selectedCircle.items.length === 0" style="color: var(--mut); font-size: 13px" x-text="t('purchaseListEmpty')"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="floating-modal info-modal" x-show="isSummaryOpen" x-transition.opacity x-cloak @click="isSummaryOpen = false">
      <div class="form-card about-card" style="height: auto; max-height: 85dvh; display: flex; flex-direction: column; background: var(--bg); padding: 16px" @click.stop>
        <header class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0">
          <h3 style="margin: 0; font-size: 18px" x-text="t('summary')"></h3>
          <button class="icon-btn clear" @click="isSummaryOpen = false"><span class="material-icons-round">close</span></button>
        </header>

        <div class="summary-paper">
          <div x-show="purchasedSummary.list.length > 0" class="summary-section">
            <div class="summary-section-header">
              <div style="display: flex; align-items: center; gap: 8px">
                <h4 x-text="t('purchased')"></h4>
                <button @click="generateReceiptImage()" class="icon-btn" :title="t('generateImage')" style="border: 1px solid var(--brd); border-radius: 4px; padding: 2px 6px; font-size: 11px; background: var(--bg)">
                  <span class="material-icons-round" style="font-size: 14px; margin-right: 4px">image</span>
                  <span x-text="t('generateImage')"></span>
                </button>
              </div>
              <div>¥<span x-text="purchasedSummary.total.toLocaleString()"></span></div>
            </div>
            <div style="display: block">
              <template x-for="(group, idx) in purchasedSummary.list" :key="idx">
                <div class="summary-group">
                  <div class="summary-circle-name" x-text="group.circleName"></div>
                  <template x-for="(item, iIdx) in group.items" :key="iIdx">
                    <div class="summary-item-row">
                      <div class="summary-item-name" x-text="item.name"></div>
                      <div class="summary-item-meta" x-show="item.quantity > 1 || item.price > 0"><span x-text="'@' + (item.price || 0).toLocaleString()"></span> x <span x-text="item.quantity || 1"></span></div>
                      <div class="summary-item-price">¥<span x-text="((item.price || 0) * (item.quantity || 1)).toLocaleString()"></span></div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <div x-show="unpurchasedSummary.list.length > 0" class="summary-section">
            <div class="summary-section-header">
              <h4 x-text="t('unpurchased')"></h4>
              <div>¥<span x-text="unpurchasedSummary.total.toLocaleString()"></span></div>
            </div>
            <div style="display: block">
              <template x-for="(group, idx) in unpurchasedSummary.list" :key="idx">
                <div class="summary-group">
                  <div class="summary-circle-name" x-text="group.circleName"></div>
                  <template x-for="(item, iIdx) in group.items" :key="iIdx">
                    <div class="summary-item-row">
                      <div class="summary-item-name" x-text="item.name"></div>
                      <div class="summary-item-meta" x-show="item.quantity > 1 || item.price > 0"><span x-text="'@' + (item.price || 0).toLocaleString()"></span> x <span x-text="item.quantity || 1"></span></div>
                      <div class="summary-item-price">¥<span x-text="((item.price || 0) * (item.quantity || 1)).toLocaleString()"></span></div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <div x-show="unpurchasedSummary.list.length === 0 && purchasedSummary.list.length === 0" style="color: var(--mut); font-size: 13px; text-align: center; padding: 20px 0" x-text="t('purchaseListEmpty')"></div>
        </div>

        <div class="summary-total-row">
          <div x-text="t('total')"></div>
          <div>¥<span x-text="totalPrice.toLocaleString()"></span></div>
        </div>
      </div>
    </div>

    <div class="floating-modal" x-show="isSettingsOpen" x-transition.opacity x-cloak style="z-index: 300" @click="isSettingsOpen = false">
      <div class="form-card event-form settings-card" @click.stop>
        <header class="modal-header"><h3 x-text="t('settings')"></h3></header>

        <div style="margin-bottom: 16px">
          <span class="group-label" x-text="t('appearance')"></span>
          <div class="segmented-control" style="margin-top: 6px">
            <button :class="{'active': appearance === 'light'}" @click="appearance = 'light'; localStorage.setItem('appearance', 'light')"><span class="material-icons-round">light_mode</span><span x-text="t('light')"></span></button>
            <button :class="{'active': appearance === 'dark'}" @click="appearance = 'dark'; localStorage.setItem('appearance', 'dark')"><span class="material-icons-round">dark_mode</span><span x-text="t('dark')"></span></button>
            <button :class="{'active': appearance === 'system'}" @click="appearance = 'system'; localStorage.setItem('appearance', 'system')"><span class="material-icons-round">settings_brightness</span><span x-text="t('system')"></span></button>
          </div>
        </div>

        <div style="margin-bottom: 16px">
          <span class="group-label" x-text="t('themeColor')"></span>
          <div class="color-picker" style="margin-top: 10px">
            <button class="color-btn" style="background-color: #020166" :class="{'active': themeColor === 'blue'}" @click="themeColor = 'blue'; localStorage.setItem('themeColor', 'blue')"></button>
            <button class="color-btn" style="background-color: #0288d1" :class="{'active': themeColor === 'sky'}" @click="themeColor = 'sky'; localStorage.setItem('themeColor', 'sky')"></button>
            <button class="color-btn" style="background-color: #00897b" :class="{'active': themeColor === 'mint'}" @click="themeColor = 'mint'; localStorage.setItem('themeColor', 'mint')"></button>
            <button class="color-btn" style="background-color: #43a047" :class="{'active': themeColor === 'sage'}" @click="themeColor = 'sage'; localStorage.setItem('themeColor', 'sage')"></button>
            <button class="color-btn" style="background-color: #f57c00" :class="{'active': themeColor === 'amber'}" @click="themeColor = 'amber'; localStorage.setItem('themeColor', 'amber')"></button>
            <button class="color-btn" style="background-color: #f4511e" :class="{'active': themeColor === 'coral'}" @click="themeColor = 'coral'; localStorage.setItem('themeColor', 'coral')"></button>
            <button class="color-btn" style="background-color: #d81b60" :class="{'active': themeColor === 'rose'}" @click="themeColor = 'rose'; localStorage.setItem('themeColor', 'rose')"></button>
            <button class="color-btn" style="background-color: #8e24aa" :class="{'active': themeColor === 'lilac'}" @click="themeColor = 'lilac'; localStorage.setItem('themeColor', 'lilac')"></button>
            <button class="color-btn" style="background-color: #424242" :class="{'active': themeColor === 'mono'}" @click="themeColor = 'mono'; localStorage.setItem('themeColor', 'mono')"></button>
          </div>
        </div>

        <div style="margin-bottom: 20px">
          <span class="group-label" x-text="t('language')"></span>
          <div class="segmented-control lang-control" style="margin-top: 6px">
            <template x-for="l in languageList" :key="l.code">
              <button :class="{'active': lang === l.code}" @click="setLang(l.code)">
                <span x-text="l.label" style="font-size: 12px; white-space: nowrap"></span>
              </button>
            </template>
          </div>
        </div>

        <div class="form-footer">
          <button @click="isSettingsOpen = false" class="btn-pill" style="flex: 1" x-text="t('close')"></button>
        </div>
      </div>
    </div>

    <div class="floating-modal info-modal" x-show="isAboutOpen" x-transition.opacity x-cloak @click="isAboutOpen = false">
      <div class="form-card about-card" style="max-height: 85dvh" @click.stop>
        <header class="modal-header" style="display: flex; justify-content: space-between; align-items: center">
          <h3 x-text="t('aboutApp')"></h3>
        </header>
        <nav class="about-tabs">
          <button @click="aboutTab = 'usage'" :class="{'active': aboutTab === 'usage'}" x-text="t('usage')"></button>
          <button @click="aboutTab = 'terms'" :class="{'active': aboutTab === 'terms'}" x-text="t('terms')"></button>
          <button @click="aboutTab = 'policy'" :class="{'active': aboutTab === 'policy'}" x-text="t('policy')"></button>
          <button @click="aboutTab = 'dev'" :class="{'active': aboutTab === 'dev'}" x-text="t('developer')"></button>
        </nav>
        <div class="about-content">

    <div class="floating-modal image-modal" x-show="previewImages.length > 0" x-transition.opacity x-cloak @click="previewImages = []">
      <button class="icon-btn light modal-close-btn" @click.stop="previewImages = []"><span class="material-icons-round">close</span></button>
      <button class="slider-btn prev" x-show="previewImages.length > 1" @click.stop="prevPreview()"><span class="material-icons-round">chevron_left</span></button>

      <div class="preview-window" id="img-scroll-wrapper" @click.stop @dblclick.stop="toggleImgZoom($event)" @touchstart="handleImgTouchStart" @touchmove="handleImgTouchMove">
        <img :src="previewImages[previewIndex]" :style="zoomedImgStyles" @load="updateImgStyle" />
      </div>

      <button class="slider-btn next" x-show="previewImages.length > 1" @click.stop="nextPreview()"><span class="material-icons-round">chevron_right</span></button>
      <div class="slider-dots" x-show="previewImages.length > 1" @click.stop>
        <template x-for="(img, idx) in previewImages" :key="idx">
          <div class="dot" :class="{'active': idx === previewIndex}"></div>
        </template>
      </div>
    </div>

    <div class="floating-modal event-modal" x-show="isEventModalOpen" x-transition.opacity x-cloak>
      <div class="form-card event-form">
        <header class="modal-header"><h3 x-text="editingEventId ? t('edit') : t('newEvent')"></h3></header>
        <div class="form-row">
          <div class="form-col">
            <span class="group-label" x-text="t('eventName')"></span>
            <input type="text" x-model="tempEventName" class="input-flat" :placeholder="t('eventName')" />
            <span class="group-label" x-text="t('eventDate')"></span>
            <input type="date" x-model="tempEventDate" class="input-flat" />
          </div>
        </div>
        <div class="form-footer">
          <button @click="saveEvent()" class="btn-pill primary" style="flex: 1" x-text="editingEventId ? t('update') : t('add')"></button>
          <button @click="isEventModalOpen = false" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
        </div>
      </div>
    </div>

    <div class="floating-modal" x-show="confirmModal.isOpen" x-transition.opacity x-cloak style="z-index: 300">
      <div class="form-card event-form">
        <p style="margin-top: 0; margin-bottom: 20px; font-size: 15px; line-height: 1.5; font-weight: 600" x-text="confirmModal.message"></p>
        <div class="form-footer">
          <button @click="if(confirmModal.onConfirm) confirmModal.onConfirm()" class="btn-pill primary" style="flex: 1" x-text="t('execute')"></button>
          <button @click="closeConfirm()" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
        </div>
      </div>
    </div>

    <div class="floating-modal" x-show="importModal.isOpen" x-transition.opacity x-cloak style="z-index: 300">
      <div class="form-card event-form">
        <header class="modal-header"><h3 x-text="t('importDataTitle')"></h3></header>

        <div style="margin-bottom: 20px">
          <span class="group-label" x-text="t('selectFile')"></span>
          <label class="btn-pill" style="margin-top: 6px; width: 100%; box-sizing: border-box; cursor: pointer; gap: 4px">
            <span class="material-icons-round" style="font-size: 18px">upload_file</span>
            <span x-text="importModal.fileName || t('selectFile')" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap"></span>
            <input type="file" @change="handleImportFileSelect" accept=".json" hidden />
          </label>
        </div>

        <div style="margin-bottom: 16px">
          <span class="group-label" x-text="t('importTarget')"></span>
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer">
              <input type="radio" value="new" x-model="importModal.mode" />
              <span x-text="t('importNewEvent')" style="font-weight: 600"></span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer">
              <input type="radio" value="append" x-model="importModal.mode" :disabled="!currentEvent" />
              <span x-text="t('importExistingEvent')" :style="!currentEvent ? 'color: var(--mut)' : 'font-weight: 600;'"></span>
            </label>
          </div>
        </div>

        <div class="form-footer">
          <button @click="executeImport()" class="btn-pill primary" style="flex: 1" :disabled="!importModal.file" x-text="t('execute')"></button>
          <button @click="importModal.isOpen = false" class="btn-pill" style="flex: 1" x-text="t('cancel')"></button>
        </div>
      </div>
    </div>
  </body>
